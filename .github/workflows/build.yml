name: Build Release Binaries

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x86, x64, ARM64]
        include:
          - platform: x86
            msbuild_platform: x86
            artifact_path: Release/
          - platform: x64
            msbuild_platform: x64
            artifact_path: x64/Release/
          - platform: ARM64
            msbuild_platform: ARM64
            artifact_path: ARM64/Release/

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    - name: Build Release (${{ matrix.platform }})
      run: >
        msbuild "Find My File!.sln"
        /p:Configuration=Release
        /p:Platform=${{ matrix.msbuild_platform }}
        /m
        /v:minimal

    - name: Upload ${{ matrix.platform }} build output
      uses: actions/upload-artifact@v5
      with:
        name: build-${{ matrix.platform }}
        path: ${{ matrix.artifact_path }}
        if-no-files-found: error
        retention-days: 1

  # ---------------------------------------------------------------
  # Package each architecture into a distributable zip and upload
  # as a workflow artifact.  Nothing is committed to the repo.
  #
  # Zip naming: find-my-file-<label>-<arch>.zip
  #   master/main -> label = releasepreview
  #   others      -> label = branch name  (e.g. release-1.0.0)
  # Each zip contains: Find My File/<exe> + Find My File/<readme>
  # ---------------------------------------------------------------
  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository (for readme)
      uses: actions/checkout@v5
      with:
        sparse-checkout: |
          Find My File - Readme.txt

    - name: Determine zip label
      id: label
      run: |
        BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        if [ "$BRANCH_NAME" = "master" ] || [ "$BRANCH_NAME" = "main" ]; then
          LABEL="releasepreview"
        else
          LABEL="$BRANCH_NAME"
        fi
        echo "value=$LABEL" >> "$GITHUB_OUTPUT"
        echo "Zip label: $LABEL"

    - name: Download all build outputs
      uses: actions/download-artifact@v5
      with:
        path: staging

    - name: Create zip packages
      run: |
        LABEL="${{ steps.label.outputs.value }}"
        mkdir -p dist

        for ARCH in ARM64 x64 x86; do
          mkdir -p "pkg/Find My File"
          cp staging/build-$ARCH/* "pkg/Find My File/"
          cp "Find My File - Readme.txt" "pkg/Find My File/"

          ZIP_NAME="find-my-file-${LABEL}-${ARCH}.zip"
          (cd pkg && zip -r "../dist/$ZIP_NAME" "Find My File")
          rm -rf pkg
        done

        echo "Generated zips:"
        ls -lh dist/*.zip

    - name: Upload ARM64 zip
      uses: actions/upload-artifact@v5
      with:
        name: find-my-file-${{ steps.label.outputs.value }}-ARM64
        path: dist/find-my-file-${{ steps.label.outputs.value }}-ARM64.zip
        retention-days: 90

    - name: Upload x64 zip
      uses: actions/upload-artifact@v5
      with:
        name: find-my-file-${{ steps.label.outputs.value }}-x64
        path: dist/find-my-file-${{ steps.label.outputs.value }}-x64.zip
        retention-days: 90

    - name: Upload x86 zip
      uses: actions/upload-artifact@v5
      with:
        name: find-my-file-${{ steps.label.outputs.value }}-x86
        path: dist/find-my-file-${{ steps.label.outputs.value }}-x86.zip
        retention-days: 90