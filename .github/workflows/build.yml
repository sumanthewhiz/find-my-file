name: Build Release Binaries

on:
  push:
    branches:
      - master
      - find-my-file-RELEASE-1.0.0
      - find-my-file-DEV
  pull_request:
    branches:
      - master
      - find-my-file-RELEASE-1.0.0
      - find-my-file-DEV
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x86, x64, ARM64]
        include:
          - platform: x86
            msbuild_platform: x86
            artifact_name: Release-x86
            artifact_path: Release/
          - platform: x64
            msbuild_platform: x64
            artifact_name: Release-x64
            artifact_path: x64/Release/
          - platform: ARM64
            msbuild_platform: ARM64
            artifact_name: Release-ARM64
            artifact_path: ARM64/Release/

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Release (${{ matrix.platform }})
      run: >
        msbuild "Find My File!.sln"
        /p:Configuration=Release
        /p:Platform=${{ matrix.msbuild_platform }}
        /m
        /v:minimal

    - name: Upload ${{ matrix.platform }} binaries
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_path }}
        if-no-files-found: error
        retention-days: 90

  # ---------------------------------------------------------------
  # Collect all three Release builds into binaries/<branch>/ and
  # commit them back to the repo.  Each branch gets its own subfolder
  # so binaries from different branches coexist in the tree.
  # Only runs on pushes (not on PRs).
  # ---------------------------------------------------------------
  publish:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine branch folder name
      id: branch
      run: |
        # Extract the short branch name from GITHUB_REF (e.g. refs/heads/master -> master)
        BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        echo "name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
        echo "Branch folder: $BRANCH_NAME"

    - name: Clean previous binaries for this branch
      run: rm -rf "binaries/${{ steps.branch.outputs.name }}"

    - name: Create target folders
      run: |
        mkdir -p "binaries/${{ steps.branch.outputs.name }}/ARM64"
        mkdir -p "binaries/${{ steps.branch.outputs.name }}/x64"
        mkdir -p "binaries/${{ steps.branch.outputs.name }}/x86"

    - name: Download ARM64 build
      uses: actions/download-artifact@v4
      with:
        name: Release-ARM64
        path: binaries/${{ steps.branch.outputs.name }}/ARM64

    - name: Download x64 build
      uses: actions/download-artifact@v4
      with:
        name: Release-x64
        path: binaries/${{ steps.branch.outputs.name }}/x64

    - name: Download x86 build
      uses: actions/download-artifact@v4
      with:
        name: Release-x86
        path: binaries/${{ steps.branch.outputs.name }}/x86

    - name: Copy readme into each folder
      run: |
        cp "Find My File - Readme.txt" "binaries/${{ steps.branch.outputs.name }}/ARM64/"
        cp "Find My File - Readme.txt" "binaries/${{ steps.branch.outputs.name }}/x64/"
        cp "Find My File - Readme.txt" "binaries/${{ steps.branch.outputs.name }}/x86/"

    - name: Commit and push binaries
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add binaries/
        # Only commit if there are actual changes
        if git diff --cached --quiet; then
          echo "No changes to binaries — skipping commit."
        else
          git commit -m "Update release binaries for ${{ steps.branch.outputs.name }} (ARM64, x64, x86) [skip ci]"
          git push
        fi