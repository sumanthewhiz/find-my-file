name: Build Release Binaries

on:
  push:
    branches:
      - master
      - release-1.0.0
      - dev
  pull_request:
    branches:
      - master
      - release-1.0.0
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x86, x64, ARM64]
        include:
          - platform: x86
            msbuild_platform: x86
            artifact_name: Release-x86
            artifact_path: Release/
          - platform: x64
            msbuild_platform: x64
            artifact_name: Release-x64
            artifact_path: x64/Release/
          - platform: ARM64
            msbuild_platform: ARM64
            artifact_name: Release-ARM64
            artifact_path: ARM64/Release/

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Release (${{ matrix.platform }})
      run: >
        msbuild "Find My File!.sln"
        /p:Configuration=Release
        /p:Platform=${{ matrix.msbuild_platform }}
        /m
        /v:minimal

    - name: Upload ${{ matrix.platform }} binaries
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_path }}
        if-no-files-found: error
        retention-days: 90

  # ---------------------------------------------------------------
  # Package each architecture into a zip and commit to binaries/.
  # Zip naming: find-my-file-<label>-<arch>.zip
  #   master  -> label = releasepreview
  #   others  -> label = branch name  (e.g. release-1.0.0, dev)
  # Each zip contains: Find My File/<binary> + Find My File/<readme>
  # Only runs on pushes (not on PRs).
  # ---------------------------------------------------------------
  publish:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine zip label
      id: label
      run: |
        BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        if [ "$BRANCH_NAME" = "master" ]; then
          LABEL="releasepreview"
        else
          LABEL="$BRANCH_NAME"
        fi
        echo "value=$LABEL" >> "$GITHUB_OUTPUT"
        echo "Zip label: $LABEL"

    - name: Download ARM64 build
      uses: actions/download-artifact@v4
      with:
        name: Release-ARM64
        path: staging/ARM64

    - name: Download x64 build
      uses: actions/download-artifact@v4
      with:
        name: Release-x64
        path: staging/x64

    - name: Download x86 build
      uses: actions/download-artifact@v4
      with:
        name: Release-x86
        path: staging/x86

    - name: Create zip packages
      run: |
        LABEL="${{ steps.label.outputs.value }}"

        # Remove old zips for this label (keeps other branches' zips intact)
        rm -f binaries/find-my-file-$LABEL-*.zip

        for ARCH in ARM64 x64 x86; do
          # Build the inner folder structure: "Find My File/"
          mkdir -p "pkg/Find My File"
          cp staging/$ARCH/* "pkg/Find My File/"
          cp "Find My File - Readme.txt" "pkg/Find My File/"

          # Create the zip
          ZIP_NAME="find-my-file-${LABEL}-${ARCH}.zip"
          (cd pkg && zip -r "../binaries/$ZIP_NAME" "Find My File")

          # Clean up for next architecture
          rm -rf pkg
        done

        echo "Generated zips:"
        ls -lh binaries/*.zip

    - name: Commit and push binaries
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add binaries/
        if git diff --cached --quiet; then
          echo "No changes to binaries — skipping commit."
        else
          git commit -m "Update release zips for ${{ steps.label.outputs.value }} (ARM64, x64, x86) [skip ci]"
          git push
        fi