name: Build Release Binaries

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x86, x64, ARM64]
        include:
          - platform: x86
            msbuild_platform: x86
            artifact_path: Release/
          - platform: x64
            msbuild_platform: x64
            artifact_path: x64/Release/
          - platform: ARM64
            msbuild_platform: ARM64
            artifact_path: ARM64/Release/

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    - name: Build Release (${{ matrix.platform }})
      run: >
        msbuild "Find My File!.sln"
        /p:Configuration=Release
        /p:Platform=${{ matrix.msbuild_platform }}
        /m
        /v:minimal

    - name: Upload ${{ matrix.platform }} build output
      uses: actions/upload-artifact@v5
      with:
        name: build-${{ matrix.platform }}
        path: |
          ${{ matrix.artifact_path }}
          !${{ matrix.artifact_path }}*.pdb
        if-no-files-found: error
        retention-days: 1

  # ---------------------------------------------------------------
  # Package each architecture into a distributable artifact.
  # Nothing is committed to the repo.
  #
  # Artifact naming: find-my-file-<label>-<arch>
  #   master/main -> label = releasepreview
  #   others      -> label = branch name  (e.g. release-1.0.0)
  # Each artifact contains: Find My File/<exe> + Find My File/<readme>
  #
  # GitHub Actions zips the artifact on download, so the user gets
  # find-my-file-<label>-<arch>.zip containing the folder directly.
  # ---------------------------------------------------------------
  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository (for readme)
      uses: actions/checkout@v5
      with:
        sparse-checkout: |
          Find My File - Readme.txt

    - name: Determine zip label
      id: label
      run: |
        BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        if [ "$BRANCH_NAME" = "master" ] || [ "$BRANCH_NAME" = "main" ]; then
          LABEL="releasepreview"
        else
          LABEL="$BRANCH_NAME"
        fi
        echo "value=$LABEL" >> "$GITHUB_OUTPUT"
        echo "Zip label: $LABEL"

    - name: Download all build outputs
      uses: actions/download-artifact@v5
      with:
        path: staging

    - name: Prepare distribution folders
      run: |
        for ARCH in ARM64 x64 x86; do
          mkdir -p "dist/$ARCH/Find My File"
          cp staging/build-$ARCH/* "dist/$ARCH/Find My File/"
          cp "Find My File - Readme.txt" "dist/$ARCH/Find My File/"
        done

        echo "Distribution contents:"
        find dist -type f

    - name: Upload ARM64 artifact
      uses: actions/upload-artifact@v5
      with:
        name: find-my-file-${{ steps.label.outputs.value }}-ARM64
        path: dist/ARM64/
        retention-days: 90

    - name: Upload x64 artifact
      uses: actions/upload-artifact@v5
      with:
        name: find-my-file-${{ steps.label.outputs.value }}-x64
        path: dist/x64/
        retention-days: 90

    - name: Upload x86 artifact
      uses: actions/upload-artifact@v5
      with:
        name: find-my-file-${{ steps.label.outputs.value }}-x86
        path: dist/x86/
        retention-days: 90

    - name: Delete intermediate build artifacts
      uses: geekyeggo/delete-artifact@v5
      with:
        name: |
          build-x86
          build-x64
          build-ARM64